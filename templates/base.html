{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="color-scheme" content="dark" />
    <title>{% block title %}Kartuli{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Georgian:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="topbar">
        <a class="brand" href="{% url 'home' %}">
            <span class="brand-mark">ქ</span>
            <span class="brand-text">Kartuli</span>
        </a>
        <nav class="nav">
            <a href="{% url 'quiz' %}" class="nav-link {% block nav_quiz %}{% endblock %}">Multiple choice</a>
            <a href="{% url 'flashcard' %}" class="nav-link {% block nav_fc %}{% endblock %}">Flashcard</a>
            <a href="{% url 'keyboard' %}" class="nav-link {% block nav_kb %}{% endblock %}">Keyboard</a>
            <a href="{% url 'dictionary' %}" class="nav-link {% block nav_dict %}{% endblock %}">Dictionary</a>
            <a href="{% url 'common_words' %}" class="nav-link {% block nav_1000 %}{% endblock %}">1000 words</a>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="{% static 'js/audio-player.js' %}" defer></script>
    {% block scripts %}{% endblock %}
</body>
</html>
