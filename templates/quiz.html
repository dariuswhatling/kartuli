{% extends "base.html" %}
{% load static %}

{% block title %}Practice – Kartuli{% endblock %}
{% block nav_quiz %}is-active{% endblock %}

{% block content %}
<section class="quiz" id="quiz">
    <details class="chapter-picker" id="chapter-picker" open>
        <summary>
            <span class="chapter-picker-label">Chapters</span>
            <span class="chapter-picker-summary" id="chapter-picker-summary">…</span>
        </summary>
        <div class="chapter-picker-body">
            <div class="chapter-picker-actions">
                <button type="button" class="btn btn-ghost btn-icon" id="select-all">Select all</button>
                <button type="button" class="btn btn-ghost btn-icon" id="select-none">Clear</button>
            </div>
            <div class="chapter-list" id="chapter-list">
                <p class="dict-empty">Loading…</p>
            </div>
        </div>
    </details>

    <div class="quiz-stats">
        <div class="stat">
            <span class="stat-label">Streak</span>
            <span class="stat-value" id="stat-streak">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">Correct</span>
            <span class="stat-value" id="stat-correct">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">Seen</span>
            <span class="stat-value" id="stat-total">0</span>
        </div>
    </div>

    <div class="card" id="card">
        <div class="card-direction" id="card-direction">Loading…</div>
        <div class="card-prompt" id="card-prompt">…</div>
    </div>

    <div class="options" id="options" role="list">
        <button class="option" type="button" disabled>—</button>
        <button class="option" type="button" disabled>—</button>
        <button class="option" type="button" disabled>—</button>
    </div>

    <div class="feedback" id="feedback" aria-live="polite"></div>
</section>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/quiz.js' %}" defer></script>
{% endblock %}
