{% extends "base.html" %}
{% load static %}

{% block title %}Flashcard – Kartuli{% endblock %}
{% block nav_fc %}is-active{% endblock %}

{% block content %}
<section class="flashcard fc" id="flashcard">
    <div class="quiz-summary">
        <span class="quiz-summary-text" id="fc-summary-text">…</span>
        <a class="quiz-summary-link" href="{% url 'flashcard' %}">Change</a>
    </div>

    <div class="quiz-stats" id="fc-stats">
        <div class="stat">
            <span class="stat-label">Streak</span>
            <span class="stat-value" id="stat-streak">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">Correct</span>
            <span class="stat-value" id="stat-correct">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">Seen</span>
            <span class="stat-value" id="stat-total">0</span>
        </div>
    </div>

    <div class="card" id="card">
        <div class="card-direction" id="card-direction">Loading…</div>
        <div class="card-prompt" id="card-prompt">…</div>
    </div>

    <div class="fc-reveal" id="fc-reveal" hidden>
        <div class="fc-reveal-label" id="fc-reveal-label"></div>
        <div class="card-prompt fc-reveal-answer" id="fc-reveal-answer"></div>
    </div>

    <div class="draw-actions">
        <div class="draw-actions-set" id="fc-toolbar">
            <button type="button" class="draw-action-btn draw-action-check fc-check-full" id="fc-check">Check</button>
        </div>
        <div class="draw-actions-set" id="fc-grade" hidden>
            <button type="button" class="draw-action-btn draw-action-wrong" id="fc-wrong">Wrong</button>
            <button type="button" class="draw-action-btn draw-action-right" id="fc-right">Correct</button>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/flashcard.js' %}" defer></script>
{% endblock %}
