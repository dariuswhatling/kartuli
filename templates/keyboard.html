{% extends "base.html" %}
{% load static %}

{% block title %}Keyboard – Kartuli{% endblock %}
{% block nav_kb %}is-active{% endblock %}

{% block content %}
<section class="kb" id="kb">
    <div class="quiz-stats">
        <div class="stat">
            <span class="stat-label">Streak</span>
            <span class="stat-value" id="stat-streak">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">Correct</span>
            <span class="stat-value" id="stat-correct">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">Seen</span>
            <span class="stat-value" id="stat-total">0</span>
        </div>
    </div>

    <div class="mode-toggle" role="tablist" aria-label="Quiz direction">
        <button
            type="button"
            class="mode-toggle-option is-active"
            data-direction="en_to_geo"
            role="tab"
            aria-selected="true"
        >Sound&nbsp;→&nbsp;Letter</button>
        <button
            type="button"
            class="mode-toggle-option"
            data-direction="geo_to_en"
            role="tab"
            aria-selected="false"
        >Letter&nbsp;→&nbsp;Sound</button>
    </div>

    <div class="card" id="card">
        <div class="card-direction" id="card-direction">Tap the matching letter</div>
        <div class="card-prompt" id="card-prompt">…</div>
    </div>

    <div class="kb-grid" id="kb-grid" aria-label="On-screen keyboard">
        <p class="kb-empty">Loading…</p>
    </div>

    <div class="feedback" id="feedback" aria-live="polite"></div>
</section>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/keyboard.js' %}" defer></script>
{% endblock %}
