<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kartuli</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #0f172a;
            --fg: #f8fafc;
            --accent: #38bdf8;
            --muted: #94a3b8;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                "Helvetica Neue", Arial, sans-serif;
            background: radial-gradient(circle at top, #1e293b, var(--bg));
            color: var(--fg);
            padding: 2rem;
        }
        main {
            max-width: 36rem;
            text-align: center;
        }
        h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            margin: 0 0 1rem;
            letter-spacing: -0.02em;
        }
        p {
            margin: 0 0 2rem;
            color: var(--muted);
            font-size: 1.125rem;
            line-height: 1.6;
        }
        .badge {
            display: inline-block;
            padding: 0.35rem 0.85rem;
            border-radius: 999px;
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent);
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }
        a {
            color: var(--accent);
            text-decoration: none;
        }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <main>
        <span class="badge">Kartuli</span>
        <h1>It works.</h1>
        <p>
            Your Django app is up and running. Edit
            <code>kartuli/views.py</code> and
            <code>templates/home.html</code> to start building.
        </p>
        <p>
            Health check available at <a href="/healthz">/healthz</a>.
        </p>
    </main>
</body>
</html>
